name: Build

on:
  push:
    branches: [ main ]          # CI build — compile check only, no release
    tags:     [ 'v*.*.*' ]      # Release build — creates a draft release

jobs:
  build:
    name: PlatformIO build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e tdeck

      # ── Rename artifacts to include tag version ───────────────
      - name: Collect artifacts
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG=${GITHUB_REF_NAME}
          mkdir dist
          cp .pio/build/tdeck/firmware.bin  dist/camillia-mt-${TAG}.bin
          cp .pio/build/tdeck/firmware.elf  dist/camillia-mt-${TAG}.elf
          cp .pio/build/tdeck/firmware.map  dist/camillia-mt-${TAG}.map 2>/dev/null || true

      # ── Draft release with all three files attached ───────────
      - name: Create draft release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.bin
            dist/*.elf
            dist/*.map
